#     depends_on:
#       ollama:
#         condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
      - qdrant
      - opensearch
      - docling

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data:
  qdrant_data:
  ollama_data:
